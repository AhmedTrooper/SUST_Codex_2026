version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sust_codex_2026_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sust_codex_2026_user
      POSTGRES_PASSWORD: sust_codex_2026_password
      POSTGRES_DB: sust_codex_2026_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sust_codex_2026_user -d sust_codex_2026_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache / Message Queue
  redis:
    image: redis:7-alpine
    container_name: sust_codex_2026_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO Local S3 Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: sust_codex_2026_minio
    restart: always
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console GUI port
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Auto-provision Bucket in MinIO on startup
  create_buckets:
    image: minio/mc
    container_name: sust_codex_2026_minio_provisioner
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set localminio http://minio:9000 admin supersecretpassword;
      /usr/bin/mc mb localminio/sust-codex-2026-bucket || true;
      /usr/bin/mc anonymous set public localminio/sust-codex-2026-bucket || true;
      echo 'MinIO Bucket [sust-codex-2026-bucket] set up successfully!';
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
